#
# ZaruBall 右側専用設定
# central 側かつトラックボール実装側だけに必要なものを置く。
#

# トラックボール(PMW3610)
CONFIG_SPI=y
CONFIG_ZMK_POINTING=y

CONFIG_PMW3610=y
# kumamuk-git ドライバでは cpi は DTS ではなく Kconfig で設定する。
# 旧設定は 900 だったが 200 刻みのみ有効なため、近い 1000 を使う。
CONFIG_PMW3610_CPI=1000
CONFIG_PMW3610_FORCE_AWAKE=y
CONFIG_PMW3610_INVERT_X=y
CONFIG_PMW3610_INVERT_Y=n
# CONFIG_PMW3610_ORIENTATION_90=y
CONFIG_INPUT=y
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=500
CONFIG_PMW3610_SCROLL_TICK=16
CONFIG_PMW3610_INVERT_SCROLL_X=y
CONFIG_PMW3610_INVERT_SCROLL_Y=n
CONFIG_PMW3610_SMART_ALGORITHM=y

# kumamuk-git ドライバの追加設定
# 打鍵振動などの微小な揺れでセンサが反応しにくいよう、しきい値を上げる。
# 値を上げるほど誤反応には強くなるが、弱いボール操作は拾いにくくなる。
CONFIG_PMW3610_MOVEMENT_THRESHOLD=40

# BluetoothTx側の出力設定
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# central 側は左側より短い idle timeout で待機に入る。
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Studio は右側(central)のみで使う。
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
